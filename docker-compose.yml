version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vibelegal}
      POSTGRES_USER: ${POSTGRES_USER:-vibelegal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    image: vibelegal/backend:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-vibelegal}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-vibelegal}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_MONTHLY_PRICE_ID: ${STRIPE_PRO_MONTHLY_PRICE_ID:-}
      STRIPE_PRO_YEARLY_PRICE_ID: ${STRIPE_PRO_YEARLY_PRICE_ID:-}
      STRIPE_ENTERPRISE_MONTHLY_PRICE_ID: ${STRIPE_ENTERPRISE_MONTHLY_PRICE_ID:-}
      STRIPE_ENTERPRISE_YEARLY_PRICE_ID: ${STRIPE_ENTERPRISE_YEARLY_PRICE_ID:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          node -e "require('http').get('http://localhost:5000/api/health', res => { if (res.statusCode !== 200) process.exit(1); }).on('error', () => process.exit(1));"
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: vibelegal/frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"
    environment:
      # Allows overriding the API URL when serving pre-built assets.
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}

volumes:
  pgdata:
